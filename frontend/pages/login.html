<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>GameRate — Login</title>
  <link rel="stylesheet" href="../css/shared.css"/>
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;}
    .auth-box{position:relative;z-index:1;width:100%;max-width:420px;padding:20px;}
    .auth-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;}
    .auth-logo{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:3px;color:var(--accent);text-align:center;display:block;margin-bottom:8px;text-decoration:none;}
    .auth-logo span{color:var(--text);}
    .auth-sub{text-align:center;font-size:14px;color:var(--muted);margin-bottom:32px;}
    .auth-footer{text-align:center;margin-top:20px;font-size:13px;color:var(--muted);}
    .auth-footer a{color:var(--accent);text-decoration:none;}
    .btn-full{width:100%;justify-content:center;}
    .divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:12px;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
  </style>
</head>
<body>
<div class="auth-box">
  <a href="/index.html" class="auth-logo">GAME<span>RATE</span></a>
  <p class="auth-sub">Entre na sua conta</p>
  <div class="auth-card">
    <div class="form-group">
      <label>E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com"/>
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="senha" placeholder="••••••••"/>
    </div>
    <div id="errMsg" class="form-error" style="margin-bottom:12px"></div>
    <button class="btn btn-accent btn-full" id="btnLogin">Entrar</button>
    <div class="divider">ou</div>
    <a href="/pages/cadastro.html" class="btn btn-ghost btn-full">Criar conta grátis</a>
  </div>
  <div class="auth-footer">
    <a href="/index.html">← Voltar para a home</a>
  </div>
</div>

<script src="/js/api.js"></script>
<script>

if (isLoggedIn()) window.location.href = '/index.html';

document.getElementById('btnLogin').addEventListener('click', async () => {
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;
  const err   = document.getElementById('errMsg');
  err.textContent = '';
  if (!email || !senha) { err.textContent = 'Preencha todos os campos'; return; }

  const btn = document.getElementById('btnLogin');
  btn.textContent = 'Entrando...'; btn.disabled = true;

  try {
    const data = await api.post('/auth/login', { email, senha });
    saveSession(data.token, data.nome, data.perfil);
    const dest = new URLSearchParams(location.search).get('next') || '/index.html';
    window.location.href = dest;
  } catch (e) {
    err.textContent = e.message;
    btn.textContent = 'Entrar'; btn.disabled = false;
  }
});

document.getElementById('senha').addEventListener('keyup', e => {
  if (e.key === 'Enter') document.getElementById('btnLogin').click();
});
</script>
</body>
</html>
